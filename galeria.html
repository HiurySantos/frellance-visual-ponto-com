<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria - Visual Ponto Com</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="galeria.css">
</head>
<body>

    <header class="topo-galeria">
        <div class="container">
            <h1>Galeria Completa</h1>
            <p>Veja mais fotos das nossas unidades</p>
            <a href="index.html" class="btn-voltar">Voltar ao site</a>
        </div>
    </header>

    <main class="pagina-galeria">
        <div class="container">

            <section id="guarapari" class="bloco-galeria">
                <h2>Guarapari</h2>
                <div class="galeria-grid" id="grid-guarapari"></div>
            </section>

            <section id="serra" class="bloco-galeria">
                <h2>Serra</h2>
                <div class="galeria-grid" id="grid-serra"></div>
            </section>

            <section id="cariacica" class="bloco-galeria">
                <h2>Cariacica</h2>
                <div class="galeria-grid" id="grid-cariacica"></div>
            </section>

            <section id="vilavelha" class="bloco-galeria">
                <h2>Vila Velha</h2>
                <div class="galeria-grid" id="grid-vilavelha"></div>
            </section>

        </div>
    </main>

    <script src="galeria.js"></script>
</body>
</html>
